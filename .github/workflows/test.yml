name: Fetch Metrics via Tailscale

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bc

      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=github-actions

      - name: Wait for connection
        run: sleep 5

      - name: Test connection
        run: ping -c 2 search-rive

      - name: Fetch and calculate metrics
        run: |
          METRICS=$(curl -s http://search-rive:9100/metrics)

          # -------- RAM --------
          MEM_TOTAL=$(echo "$METRICS" | grep '^node_memory_MemTotal_bytes' | awk '{print $2}' | head -n1)
          MEM_AVAIL=$(echo "$METRICS" | grep '^node_memory_MemAvailable_bytes' | awk '{print $2}' | head -n1)

          if [[ "$MEM_TOTAL" =~ ^[0-9]+$ ]] && [[ "$MEM_AVAIL" =~ ^[0-9]+$ ]]; then
            RAM_USED=$(echo "scale=0; (($MEM_TOTAL - $MEM_AVAIL) * 100) / $MEM_TOTAL" | bc)
          else
            echo "Invalid RAM metrics"
            RAM_USED=0
          fi

          # -------- CPU (load-based, stable) --------
          LOAD=$(echo "$METRICS" | grep '^node_load1 ' | awk '{print $2}' | head -n1)

          if [[ "$LOAD" =~ ^[0-9.]+$ ]]; then
            CPU_USAGE=$(echo "scale=0; $LOAD * 100" | bc)
          else
            echo "Invalid CPU metrics"
            CPU_USAGE=0
          fi

          echo "CPU: $CPU_USAGE%"
          echo "RAM: $RAM_USED%"

          echo "{\"cpu\": $CPU_USAGE, \"ram\": $RAM_USED}" > metrics.json

      - name: Commit metrics.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add metrics.json
          git commit -m "update metrics" || exit 0
          git push
