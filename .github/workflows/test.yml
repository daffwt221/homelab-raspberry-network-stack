name: Fetch Metrics via Tailscale

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - run: sudo apt-get update && sudo apt-get install -y bc

      - run: curl -fsSL https://tailscale.com/install.sh | sh

      - run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=github-actions

      - run: sleep 5

      - run: ping -c 2 search-rive

      - name: Fetch and calculate metrics
        run: |
          METRICS=$(curl -s http://search-rive:9100/metrics)

          MEM_TOTAL=$(echo "$METRICS" | grep 'node_memory_MemTotal_bytes' | grep -v '^#' | head -n1 | awk '{printf "%.0f", $2}')
          MEM_AVAIL=$(echo "$METRICS" | grep 'node_memory_MemAvailable_bytes' | grep -v '^#' | head -n1 | awk '{printf "%.0f", $2}')

          if [[ "$MEM_TOTAL" =~ ^[0-9]+$ ]] && [[ "$MEM_AVAIL" =~ ^[0-9]+$ ]]; then
            RAM_USED=$(echo "scale=0; (($MEM_TOTAL - $MEM_AVAIL) * 100) / $MEM_TOTAL" | bc)
          else
            RAM_USED=0
          fi

          LOAD=$(echo "$METRICS" | grep '^node_load1 ' | awk '{print $2}' | head -n1)

          if [[ "$LOAD" =~ ^[0-9.]+$ ]]; then
            CPU_USAGE=$(echo "scale=0; $LOAD * 100" | bc)
          else
            CPU_USAGE=0
          fi

          echo "{\"schemaVersion\":1,\"label\":\"CPU\",\"message\":\"${CPU_USAGE}%\",\"color\":\"green\"}" > cpu.json
          echo "{\"schemaVersion\":1,\"label\":\"RAM\",\"message\":\"${RAM_USED}%\",\"color\":\"blue\"}" > ram.json

      - name: Commit metrics
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add cpu.json ram.json
          git commit -m "update metrics" || exit 0
          git push
