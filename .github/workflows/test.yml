name: Fetch Metrics via Tailscale

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y bc

      - run: curl -fsSL https://tailscale.com/install.sh | sh

      - run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=github-actions

      - run: sleep 5

      - run: ping -c 2 search-rive

      - name: Fetch and calculate metrics
        run: |
          METRICS=$(curl -s http://search-rive:9100/metrics)

          # -------- RAM --------
          MEM_TOTAL=$(echo "$METRICS" | awk '$1=="node_memory_MemTotal_bytes" {print $2}')
          MEM_AVAIL=$(echo "$METRICS" | awk '$1=="node_memory_MemAvailable_bytes" {print $2}')

          RAM_USED=$(echo "scale=0; (($MEM_TOTAL - $MEM_AVAIL) / $MEM_TOTAL) * 100" | bc)

          # -------- CPU --------
          CPU_IDLE=$(echo "$METRICS" | \
            awk '$1=="node_cpu_seconds_total" && $0 ~ /mode="idle"/ {sum+=$2} END {print sum}')

          sleep 1

          METRICS2=$(curl -s http://search-rive:9100/metrics)

          CPU_IDLE2=$(echo "$METRICS2" | \
            awk '$1=="node_cpu_seconds_total" && $0 ~ /mode="idle"/ {sum+=$2} END {print sum}')

          CPU_USAGE=$(echo "scale=0; (1 - ($CPU_IDLE2 - $CPU_IDLE)) * 100" | bc)

          echo "CPU: $CPU_USAGE%"
          echo "RAM: $RAM_USED%"

          echo "{\"cpu\": $CPU_USAGE, \"ram\": $RAM_USED}" > metrics.json

      - name: Commit metrics
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add metrics.json
          git commit -m "update metrics" || exit 0
          git push
