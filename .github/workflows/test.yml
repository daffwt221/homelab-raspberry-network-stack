name: Fetch Metrics via Tailscale

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y bc

      - run: curl -fsSL https://tailscale.com/install.sh | sh

      - run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=github-actions

      - run: sleep 5

      - run: ping -c 2 search-rive

      - name: Fetch and calculate metrics
        run: |
          METRICS=$(curl -s http://search-rive:9100/metrics)

          # -------- RAM --------
          MEM_TOTAL=$(echo "$METRICS" | awk 'index($1,"node_memory_MemTotal_bytes")==1 {print $2}' | head -n1)
          MEM_AVAIL=$(echo "$METRICS" | awk 'index($1,"node_memory_MemAvailable_bytes")==1 {print $2}' | head -n1)

          if [[ "$MEM_TOTAL" =~ ^[0-9]+$ ]] && [[ "$MEM_AVAIL" =~ ^[0-9]+$ ]]; then
            RAM_USED=$(echo "scale=0; (($MEM_TOTAL - $MEM_AVAIL) * 100) / $MEM_TOTAL" | bc)
          else
            echo "Invalid RAM metrics"
            RAM_USED=0
          fi

          # -------- CPU --------
          CPU_IDLE=$(echo "$METRICS" | \
            awk 'index($1,"node_cpu_seconds_total")==1 && $0 ~ /mode="idle"/ {sum+=$2} END {print int(sum)}')

          sleep 1

          METRICS2=$(curl -s http://search-rive:9100/metrics)

          CPU_IDLE2=$(echo "$METRICS2" | \
            awk 'index($1,"node_cpu_seconds_total")==1 && $0 ~ /mode="idle"/ {sum+=$2} END {print int(sum)}')

          if [[ "$CPU_IDLE" =~ ^[0-9]+$ ]] && [[ "$CPU_IDLE2" =~ ^[0-9]+$ ]]; then
            DIFF=$(echo "$CPU_IDLE2 - $CPU_IDLE" | bc)
            CPU_USAGE=$(echo "scale=0; (1 - $DIFF) * 100" | bc)
          else
            echo "Invalid CPU metrics"
            CPU_USAGE=0
          fi

          echo "CPU: $CPU_USAGE%"
          echo "RAM: $RAM_USED%"

          echo "{\"cpu\": $CPU_USAGE, \"ram\": $RAM_USED}" > metrics.json

      - name: Commit metrics
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add metrics.json
          git commit -m "update metrics" || exit 0
          git push
