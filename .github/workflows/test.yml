name: Fetch Metrics via Tailscale

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y bc

      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      - name: Connect to Tailscale
        run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
            --hostname=github-actions \
            --accept-routes

      - name: Wait for connection
        run: sleep 5

      - name: Test connection
        run: ping -c 2 search-rive

      - name: Fetch and calculate metrics
        run: |
          METRICS=$(curl -s http://search-rive:9100/metrics)

          # -------- RAM --------
          MEM_TOTAL=$(echo "$METRICS" | awk '/node_memory_MemTotal_bytes/ {print $2}')
          MEM_AVAIL=$(echo "$METRICS" | awk '/node_memory_MemAvailable_bytes/ {print $2}')

          if [ -z "$MEM_TOTAL" ] || [ -z "$MEM_AVAIL" ]; then
            echo " Failed to get RAM metrics, defaulting to 0"
            RAM_USED=0
          else
            RAM_USED=$(echo "scale=0; (($MEM_TOTAL - $MEM_AVAIL) / $MEM_TOTAL) * 100" | bc)
          fi

          # -------- CPU --------
          CPU_IDLE=$(echo "$METRICS" | \
            awk '/node_cpu_seconds_total.*mode="idle"/ {sum+=$2} END {print sum}')

          sleep 1

          METRICS2=$(curl -s http://search-rive:9100/metrics)

          CPU_IDLE2=$(echo "$METRICS2" | \
            awk '/node_cpu_seconds_total.*mode="idle"/ {sum+=$2} END {print sum}')

          if [ -z "$CPU_IDLE" ] || [ -z "$CPU_IDLE2" ]; then
            echo "⚠️ Failed to get CPU metrics, defaulting to 0"
            CPU_USAGE=0
          else
            CPU_USAGE=$(echo "scale=0; (1 - ($CPU_IDLE2 - $CPU_IDLE)) * 100" | bc)
          fi

          echo "CPU: $CPU_USAGE%"
          echo "RAM: $RAM_USED%"

          echo "{\"cpu\": $CPU_USAGE, \"ram\": $RAM_USED}" > metrics.json

      - name: Commit metrics.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add metrics.json
          git commit -m "update metrics" || exit 0
          git push
